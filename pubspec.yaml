name: mode_rentals
description: "Mode Rentals Staff Attendance App."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.32.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase — database + file storage
  supabase_flutter: ^2.5.6

  # GPS / Location
  geolocator: ^10.1.0

  # Camera — front-camera only
  image_picker: ^1.1.2

  # HTTP for multipart upload
  http: ^1.2.1

  # Date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true