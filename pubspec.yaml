name: mode_rentals
description: "Mode Rentals Staff Attendance App."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <3.9.0'
  flutter: '>=3.32.0'

dependencies:
  flutter:
    sdk: flutter

  # GPS / Location
  geolocator: ^12.0.0

  # Camera (selfie capture)
  camera: ^0.11.0

  # Permissions handler
  permission_handler: ^11.3.1

  # Local storage (save clock-in records)
  shared_preferences: ^2.3.2

  # Date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true